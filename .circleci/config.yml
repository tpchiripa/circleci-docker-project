version: 2.1

jobs:
  build:
    docker:
      - image: docker:24.0

    steps:
      - checkout

      - setup_remote_docker

      - run:
          name: Build Docker image
          command: |
            docker build -t circleci-custom-image:latest .

      - run:
          name: Run Docker container
          command: |
            docker run circleci-custom-image:latest echo "Docker build successful!"